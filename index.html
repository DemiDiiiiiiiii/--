<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拾遗</title>
<style>
  :root {
    --paper: #f7f3ec;
    --ink: #2b2926;
    --ink-soft: #6b645c;
    --line: #ddd6cc;
    --accent: #8a6d4b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Noto Serif SC", "Songti SC", "SimSun", serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.9;
    padding-bottom: 80px;
  }
  header {
    padding: 28px 20px 16px;
    text-align: center;
    border-bottom: 1px solid var(--line);
  }
  header h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.3em;
  }
  header p {
    margin: 6px 0 0;
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.1em;
  }
  nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    background: var(--paper);
    border-top: 1px solid var(--line);
    z-index: 10;
  }
  nav button {
    flex: 1;
    background: none;
    border: none;
    padding: 12px 0;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink-soft);
    letter-spacing: 0.2em;
  }
  nav button.active {
    color: var(--ink);
    border-top: 2px solid var(--accent);
    margin-top: -1px;
  }
  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 16px;
  }
  .view { display: none; }
  .view.active { display: block; }

  .card {
    background: #fffdf9;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 18px 20px;
    margin-bottom: 14px;
  }
  .card .content {
    font-size: 18px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .card.word .content {
    font-size: 20px;
    letter-spacing: 0.1em;
  }
  .card .note {
    margin-top: 8px;
    font-size: 13px;
    color: var(--ink-soft);
    white-space: pre-wrap;
  }
  .card .source {
    margin-top: 8px;
    font-size: 12px;
    color: var(--accent);
    text-align: right;
  }
  .card .actions {
    margin-top: 10px;
    display: flex;
    gap: 14px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .card .actions span {
    cursor: pointer;
    border-bottom: 1px dotted var(--ink-soft);
  }
  .ai-panel {
    margin-top: 10px;
    padding: 10px 12px;
    background: #f1ece2;
    border-radius: 4px;
    font-size: 13px;
    color: var(--ink);
    white-space: pre-wrap;
    display: none;
  }
  .ai-panel.show { display: block; }
  .ai-panel textarea {
    width: 100%;
    font-family: inherit;
    font-size: 13px;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 6px;
    margin-bottom: 6px;
    resize: vertical;
    background: #fff;
  }
  .ai-panel button {
    font-family: inherit;
    font-size: 12px;
    border: 1px solid var(--accent);
    background: none;
    color: var(--accent);
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
  }

  .refresh-btn {
    display: block;
    margin: 0 auto 18px;
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 20px;
    padding: 6px 24px;
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 0.2em;
    cursor: pointer;
  }

  /* 检索 */
  .search-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .search-bar input {
    flex: 1;
    font-family: inherit;
    font-size: 14px;
    padding: 8px 12px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: #fffdf9;
  }
  .search-bar select, .search-bar button {
    font-family: inherit;
    font-size: 13px;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: #fffdf9;
    color: var(--ink);
  }

  /* 录入 */
  textarea#importText {
    width: 100%;
    height: 240px;
    font-family: inherit;
    font-size: 14px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: #fffdf9;
    resize: vertical;
  }
  .primary-btn {
    margin-top: 10px;
    background: var(--accent);
    color: #fffdf9;
    border: none;
    border-radius: 4px;
    padding: 10px 20px;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 0.2em;
    cursor: pointer;
  }
  .hint {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 8px;
  }

  /* 晨课 */
  .recite-card .content.hidden-text {
    filter: blur(6px);
    user-select: none;
  }
  .recite-controls {
    margin-top: 10px;
    display: flex;
    gap: 12px;
  }
  .recite-controls button {
    font-family: inherit;
    font-size: 13px;
    border: 1px solid var(--accent);
    background: none;
    color: var(--accent);
    border-radius: 4px;
    padding: 6px 14px;
    cursor: pointer;
  }

  .settings-link {
    text-align: center;
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 30px;
    cursor: pointer;
  }
  .empty {
    text-align: center;
    color: var(--ink-soft);
    font-size: 13px;
    padding: 30px 0;
  }
</style>
</head>
<body>

<header>
  <h1>拾遗</h1>
  <p>古语 · 旧句 · 私藏</p>
</header>

<main>
  <div class="view active" id="view-home">
    <button class="refresh-btn" onclick="loadRandom()">再看几条</button>
    <div id="home-list"></div>
  </div>

  <div class="view" id="view-search">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="查词句，或描述一种感觉…">
      <select id="searchMode">
        <option value="keyword">关键词</option>
        <option value="semantic">意思</option>
      </select>
      <button onclick="doSearch()">找</button>
    </div>
    <div id="search-list"></div>
  </div>

  <div class="view" id="view-import">
    <p class="hint">把摘抄的文本整段粘贴进来，系统只做切分整理，不会自动添加解释。</p>
    <textarea id="importText" placeholder="粘贴一段或多段摘抄…"></textarea>
    <button class="primary-btn" onclick="doImport()">整理入库</button>
    <div id="import-result"></div>
  </div>

  <div class="view" id="view-recite">
    <p class="hint">先听声调节奏，再看是否能补全。每组随机抽取，按句式相近排列。</p>
    <button class="refresh-btn" onclick="loadRecitation()">换一组</button>
    <div id="recite-list"></div>
  </div>

  <div class="settings-link" onclick="showSettings()">设置接口地址</div>
</main>

<nav>
  <button class="active" data-view="home" onclick="switchView('home')">邂逅</button>
  <button data-view="search" onclick="switchView('search')">试问</button>
  <button data-view="import" onclick="switchView('import')">录入</button>
  <button data-view="recite" onclick="switchView('recite')">晨课</button>
</nav>

<script>
let API_BASE = 'https://shici-vault.demi89612.workers.dev';

function showSettings() {
  const url = prompt('请输入 Worker 的 API 地址（例如 https://shici-vault.xxx.workers.dev）', API_BASE);
  if (url !== null) {
    API_BASE = url.trim().replace(/\/$/, '');
    localStorage.setItem('shici_api_base', API_BASE);
  }
}

if (false) {
  
}

function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelector('nav button[data-view="' + name + '"]').classList.add('active');
  if (name === 'home' && !document.getElementById('home-list').children.length) loadRandom();
  if (name === 'recite' && !document.getElementById('recite-list').children.length) loadRecitation();
}

async function api(path, opts = {}) {
  const res = await fetch(API_BASE + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts
  });
  return res.json();
}

// ---------- 卡片渲染 ----------
function renderCard(entry, extraClass = '') {
  const div = document.createElement('div');
  div.className = 'card ' + entry.type + ' ' + extraClass;
  div.dataset.id = entry.id;

  let html = `<div class="content">${escapeHtml(entry.content)}</div>`;
  if (entry.note) html += `<div class="note">${escapeHtml(entry.note)}</div>`;
  if (entry.source) html += `<div class="source">${escapeHtml(entry.source)}</div>`;

  html += `<div class="actions">`;
  if (entry.type === 'word') {
    html += `<span onclick="loadEtymology(${entry.id}, this)">溯源</span>`;
  } else {
    html += `<span onclick="toggleAsk(${entry.id}, this)">试问</span>`;
  }
  html += `<span onclick="editEntry(${entry.id}, this)">改</span>`;
  html += `<span onclick="deleteEntry(${entry.id}, this)">删</span>`;
  html += `</div>`;
  html += `<div class="ai-panel"></div>`;

  div.innerHTML = html;
  return div;
}

function escapeHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---------- 首页随机 ----------
async function loadRandom() {
  const list = document.getElementById('home-list');
  list.innerHTML = '<div class="empty">翻阅中…</div>';
  const data = await api('/api/random?n=8');
  list.innerHTML = '';
  if (!data.entries || data.entries.length === 0) {
    list.innerHTML = '<div class="empty">库里还空着，去"录入"添加一些吧</div>';
    return;
  }
  data.entries.forEach(e => list.appendChild(renderCard(e)));
}

// ---------- 溯源 ----------
async function loadEtymology(id, btn) {
  const card = btn.closest('.card');
  const panel = card.querySelector('.ai-panel');
  if (panel.classList.contains('show')) {
    panel.classList.remove('show');
    return;
  }
  panel.classList.add('show');
  panel.textContent = '查证中…';
  const data = await api('/api/etymology', {
    method: 'POST',
    body: JSON.stringify({ id })
  });
  panel.textContent = data.content || data.error || '未能查到';
}

// ---------- 试问 ----------
function toggleAsk(id, btn) {
  const card = btn.closest('.card');
  const panel = card.querySelector('.ai-panel');
  if (panel.classList.contains('show')) {
    panel.classList.remove('show');
    return;
  }
  panel.classList.add('show');
  panel.innerHTML = `
    <textarea rows="2" placeholder="想问什么？留空则给出一般解读"></textarea>
    <button onclick="doAsk(${id}, this)">问</button>
    <div class="answer" style="margin-top:8px;"></div>
  `;
}

async function doAsk(id, btn) {
  const panel = btn.closest('.ai-panel');
  const question = panel.querySelector('textarea').value;
  const answerDiv = panel.querySelector('.answer');
  answerDiv.textContent = '想着…';
  const data = await api('/api/ask', {
    method: 'POST',
    body: JSON.stringify({ id, question })
  });
  answerDiv.textContent = data.content || data.error || '暂时没有回应';
}

// ---------- 编辑/删除 ----------
async function editEntry(id, btn) {
  const card = btn.closest('.card');
  const contentDiv = card.querySelector('.content');
  const current = contentDiv.textContent;
  const updated = prompt('编辑内容：', current);
  if (updated === null || updated === current) return;
  await api('/api/entry/' + id, {
    method: 'PUT',
    body: JSON.stringify({ content: updated })
  });
  contentDiv.textContent = updated;
}

async function deleteEntry(id, btn) {
  if (!confirm('确定删除这一条吗？')) return;
  await api('/api/entry/' + id, { method: 'DELETE' });
  btn.closest('.card').remove();
}

// ---------- 检索 ----------
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  const mode = document.getElementById('searchMode').value;
  const list = document.getElementById('search-list');
  if (!q) return;
  list.innerHTML = '<div class="empty">寻访中…</div>';

  let data;
  if (mode === 'semantic') {
    data = await api('/api/semantic', {
      method: 'POST',
      body: JSON.stringify({ query: q, n: 10 })
    });
  } else {
    data = await api('/api/search?q=' + encodeURIComponent(q));
  }

  list.innerHTML = '';
  if (!data.entries || data.entries.length === 0) {
    list.innerHTML = '<div class="empty">没有找到相近的</div>';
    return;
  }
  data.entries.forEach(e => list.appendChild(renderCard(e)));
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// ---------- 录入 ----------
async function doImport() {
  const text = document.getElementById('importText').value;
  if (!text.trim()) return;
  const resultDiv = document.getElementById('import-result');
  resultDiv.innerHTML = '<div class="empty">整理中，请稍候…</div>';
  const data = await api('/api/import', {
    method: 'POST',
    body: JSON.stringify({ text })
  });
  if (data.error) {
    resultDiv.innerHTML = '<div class="empty">出错了：' + escapeHtml(data.error) + '</div>';
    return;
  }
  resultDiv.innerHTML = `<p class="hint">已收入 ${data.count} 条：</p>`;
  data.inserted.forEach(e => resultDiv.appendChild(renderCard(e)));
  document.getElementById('importText').value = '';
}

// ---------- 晨课 ----------
let voicesReady = false;
function pickChineseVoice() {
  const voices = speechSynthesis.getVoices();
  return voices.find(v => v.lang.startsWith('zh')) || voices[0];
}
speechSynthesis.onvoiceschanged = () => { voicesReady = true; };

function speak(text) {
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-CN';
  utter.rate = 0.75;
  const voice = pickChineseVoice();
  if (voice) utter.voice = voice;
  speechSynthesis.speak(utter);
}

async function loadRecitation() {
  const list = document.getElementById('recite-list');
  list.innerHTML = '<div class="empty">挑选中…</div>';
  const data = await api('/api/recitation?n=8');
  list.innerHTML = '';
  if (!data.entries || data.entries.length === 0) {
    list.innerHTML = '<div class="empty">还没有诗句类词条，先去录入一些吧</div>';
    return;
  }
  data.entries.forEach(e => {
    const card = document.createElement('div');
    card.className = 'card recite-card';
    card.innerHTML = `
      <div class="content hidden-text">${escapeHtml(e.content)}</div>
      ${e.source ? `<div class="source">${escapeHtml(e.source)}</div>` : ''}
      <div class="recite-controls">
        <button onclick="speak(${JSON.stringify(e.content)})">听</button>
        <button onclick="this.closest('.card').querySelector('.content').classList.toggle('hidden-text')">显 / 隐</button>
      </div>
    `;
    list.appendChild(card);
  });
}
</script>
</body>
</html>

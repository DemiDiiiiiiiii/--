<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拾遗</title>
<style>
:root {
  --paper: #f7f3ec;
  --ink: #2b2926;
  --ink-soft: #6b645c;
  --line: #ddd6cc;
  --accent: #8a6d4b;
  --panel-bg: #f0ebe0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Noto Serif SC", "Songti SC", "SimSun", serif;
  background: var(--paper);
  color: var(--ink);
  line-height: 1.9;
  padding-bottom: 72px;
}
header {
  padding: 24px 20px 14px;
  text-align: center;
  border-bottom: 1px solid var(--line);
}
header h1 { font-size: 22px; font-weight: 500; letter-spacing: 0.35em; }
header p { font-size: 12px; color: var(--ink-soft); letter-spacing: 0.12em; margin-top: 4px; }

nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; background: var(--paper);
  border-top: 1px solid var(--line); z-index: 10;
}
nav button {
  flex: 1; background: none; border: none;
  padding: 12px 0; font-family: inherit;
  font-size: 14px; color: var(--ink-soft);
  letter-spacing: 0.2em; cursor: pointer;
}
nav button.active {
  color: var(--ink);
  border-top: 2px solid var(--accent);
  margin-top: -1px;
}

main { max-width: 640px; margin: 0 auto; padding: 16px; }
.view { display: none; }
.view.active { display: block; }

/* 卡片 */
.card {
  background: #fffdf9;
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 18px 20px;
  margin-bottom: 14px;
}
.card .content {
  font-size: 17px;
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 2;
}
.card.word .content { font-size: 20px; letter-spacing: 0.08em; }
.card .note { margin-top: 8px; font-size: 13px; color: var(--ink-soft); white-space: pre-wrap; }
.card .source { margin-top: 6px; font-size: 12px; color: var(--accent); text-align: right; }
.card .tags { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }
.card .tag {
  font-size: 11px; color: var(--accent);
  border: 1px solid var(--accent);
  border-radius: 10px; padding: 1px 8px;
  cursor: pointer;
}
.card .actions {
  margin-top: 12px; display: flex; gap: 16px;
  font-size: 12px; color: var(--ink-soft);
  flex-wrap: wrap;
}
.card .actions span {
  cursor: pointer;
  border-bottom: 1px dotted var(--ink-soft);
  padding-bottom: 1px;
}
.card .actions span.active-action { color: var(--accent); border-color: var(--accent); }

/* AI面板 */
.ai-panel {
  margin-top: 10px; padding: 12px 14px;
  background: var(--panel-bg); border-radius: 4px;
  font-size: 13px; color: var(--ink);
  white-space: pre-wrap; display: none;
  line-height: 1.8;
}
.ai-panel.show { display: block; }
.ai-panel textarea {
  width: 100%; font-family: inherit; font-size: 13px;
  border: 1px solid var(--line); border-radius: 4px;
  padding: 6px 8px; margin-bottom: 8px; resize: vertical;
  background: #fff; line-height: 1.7;
}
.ai-panel .ask-btn {
  font-family: inherit; font-size: 12px;
  border: 1px solid var(--accent); background: none;
  color: var(--accent); border-radius: 4px;
  padding: 4px 12px; cursor: pointer;
  letter-spacing: 0.1em;
}
.ai-panel .answer { margin-top: 10px; white-space: pre-wrap; }

/* 笔记面板 */
.notes-panel {
  margin-top: 10px; padding: 12px 14px;
  background: #faf6ee; border-radius: 4px;
  border-left: 2px solid var(--accent);
  display: none;
}
.notes-panel.show { display: block; }
.note-item {
  font-size: 13px; color: var(--ink);
  padding: 6px 0; border-bottom: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 8px; white-space: pre-wrap; line-height: 1.7;
}
.note-item:last-of-type { border-bottom: none; }
.note-del { font-size: 11px; color: var(--ink-soft); cursor: pointer; flex-shrink: 0; }
.note-input-area { margin-top: 8px; display: flex; gap: 8px; }
.note-input-area textarea {
  flex: 1; font-family: inherit; font-size: 13px;
  border: 1px solid var(--line); border-radius: 4px;
  padding: 6px 8px; resize: none; background: #fff;
  line-height: 1.7;
}
.note-input-area button {
  font-family: inherit; font-size: 12px;
  border: 1px solid var(--accent); background: none;
  color: var(--accent); border-radius: 4px;
  padding: 4px 10px; cursor: pointer; flex-shrink: 0;
}

/* 邂逅页 */
.refresh-btn {
  display: block; margin: 0 auto 18px;
  background: none; border: 1px solid var(--accent);
  color: var(--accent); border-radius: 20px;
  padding: 6px 24px; font-family: inherit;
  font-size: 13px; letter-spacing: 0.2em; cursor: pointer;
}
.recite-controls { margin-top: 10px; display: flex; gap: 10px; }
.recite-controls button {
  font-family: inherit; font-size: 12px;
  border: 1px solid var(--line); background: none;
  color: var(--ink-soft); border-radius: 4px;
  padding: 4px 12px; cursor: pointer;
}
.recite-controls button.speaking {
  border-color: var(--accent); color: var(--accent);
}

/* 藏书页 */
.shelf-bar {
  display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
}
.shelf-bar input {
  flex: 1; min-width: 120px; font-family: inherit; font-size: 14px;
  padding: 8px 12px; border: 1px solid var(--line);
  border-radius: 4px; background: #fffdf9;
}
.shelf-bar select, .shelf-bar button {
  font-family: inherit; font-size: 13px;
  padding: 8px 10px; border: 1px solid var(--line);
  border-radius: 4px; background: #fffdf9; color: var(--ink);
  cursor: pointer;
}
.shelf-pagination {
  display: flex; justify-content: center;
  gap: 14px; margin-top: 16px;
  font-size: 13px; color: var(--ink-soft);
}
.shelf-pagination span { cursor: pointer; border-bottom: 1px dotted var(--ink-soft); }
.shelf-pagination .page-info { cursor: default; border: none; }
.export-btn {
  display: block; margin: 20px auto 0;
  background: none; border: 1px solid var(--line);
  color: var(--ink-soft); border-radius: 4px;
  padding: 8px 20px; font-family: inherit;
  font-size: 12px; letter-spacing: 0.15em; cursor: pointer;
}

/* 录入页 */
textarea#importText {
  width: 100%; height: 220px; font-family: inherit;
  font-size: 14px; padding: 12px; border: 1px solid var(--line);
  border-radius: 4px; background: #fffdf9; resize: vertical;
  line-height: 1.8;
}
.primary-btn {
  margin-top: 10px; background: var(--accent); color: #fffdf9;
  border: none; border-radius: 4px; padding: 10px 20px;
  font-family: inherit; font-size: 14px;
  letter-spacing: 0.2em; cursor: pointer;
}
.hint { font-size: 12px; color: var(--ink-soft); margin-top: 6px; margin-bottom: 10px; }
.empty { text-align: center; color: var(--ink-soft); font-size: 13px; padding: 30px 0; }

/* 标签编辑弹出 */
.tag-edit-panel {
  margin-top: 8px; display: none;
}
.tag-edit-panel.show { display: flex; gap: 8px; }
.tag-edit-panel input {
  flex: 1; font-family: inherit; font-size: 13px;
  padding: 5px 8px; border: 1px solid var(--line);
  border-radius: 4px; background: #fff;
}
.tag-edit-panel button {
  font-family: inherit; font-size: 12px;
  border: 1px solid var(--accent); background: none;
  color: var(--accent); border-radius: 4px;
  padding: 4px 10px; cursor: pointer;
}
</style>
</head>
<body>

<header>
  <h1>拾遗</h1>
  <p>古语 · 旧句 · 私藏</p>
</header>

<main>
  <!-- 邂逅 -->
  <div class="view active" id="view-home">
    <button class="refresh-btn" onclick="loadRandom()">再看几条</button>
    <div id="home-list"></div>
  </div>

  <!-- 藏书 -->
  <div class="view" id="view-shelf">
    <div class="shelf-bar">
      <input type="text" id="shelfSearch" placeholder="搜词句、意思、标记…">
      <select id="shelfMode">
        <option value="keyword">关键词</option>
        <option value="semantic">意思</option>
      </select>
      <button onclick="doShelfSearch()">找</button>
    </div>
    <div id="shelf-list"></div>
    <div class="shelf-pagination" id="shelf-pagination"></div>
    <button class="export-btn" onclick="doExport()">导出全部词条</button>
  </div>

  <!-- 录入 -->
  <div class="view" id="view-import">
    <p class="hint">把摘抄的文本整段粘贴进来，系统只做切分整理，不会自动添加解释。</p>
    <textarea id="importText" placeholder="粘贴一段或多段摘抄…"></textarea>
    <button class="primary-btn" onclick="doImport()">整理入库</button>
    <div id="import-result"></div>
  </div>
</main>

<nav>
  <button class="active" data-view="home" onclick="switchView('home')">邂逅</button>
  <button data-view="shelf" onclick="switchView('shelf')">藏书</button>
  <button data-view="import" onclick="switchView('import')">录入</button>
</nav>

<script>
const API_BASE = 'https://shici-vault.demi89612.workers.dev';

let shelfOffset = 0;
const SHELF_LIMIT = 20;
let shelfTotal = 0;
let currentSpeakBtn = null;

function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelector(`nav button[data-view="${name}"]`).classList.add('active');
  if (name === 'home' && !document.getElementById('home-list').children.length) loadRandom();
  if (name === 'shelf' && !document.getElementById('shelf-list').children.length) loadShelf();
}

async function api(path, opts = {}) {
  const res = await fetch(API_BASE + path, {
    headers: { 'Content-Type': 'application/json' }, ...opts
  });
  return res.json();
}

function escapeHtml(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── 卡片渲染 ──────────────────────────────────────
function renderCard(entry, showListen = false) {
  const div = document.createElement('div');
  div.className = 'card ' + entry.type;
  div.dataset.id = entry.id;

  let html = `<div class="content">${escapeHtml(entry.content)}</div>`;
  if (entry.note) html += `<div class="note">${escapeHtml(entry.note)}</div>`;
  if (entry.source) html += `<div class="source">${escapeHtml(entry.source)}</div>`;

  // 标签显示
  const tagList = parseTags(entry.tags);
  if (tagList.length > 0) {
    html += `<div class="tags">${tagList.map(t => `<span class="tag" onclick="filterByTag('${escapeHtml(t)}')">${escapeHtml(t)}</span>`).join('')}</div>`;
  }

  // 操作栏
  html += `<div class="actions">
    <span class="ety-toggle" onclick="togglePanel(this,'ety')">溯源</span>
    <span class="ask-toggle" onclick="togglePanel(this,'ask')">试问</span>
    <span class="note-toggle" onclick="togglePanel(this,'notes')">笔记</span>
    <span onclick="toggleTagEdit(this)">标记</span>
    <span onclick="editEntry(${entry.id}, this)">改</span>
    <span onclick="deleteEntry(${entry.id}, this)">删</span>
  </div>`;

  // 标签编辑区
  html += `<div class="tag-edit-panel">
    <input type="text" placeholder="用空格分隔多个标记" value="${escapeHtml(entry.tags || '')}">
    <button onclick="saveTags(${entry.id}, this)">存</button>
  </div>`;

  // 溯源面板
  html += `<div class="ai-panel etymology-panel"></div>`;
  // 试问面板
  html += `<div class="ai-panel ask-panel">
    <textarea rows="2" placeholder="想问什么？留空则给出一般解读"></textarea>
    <button class="ask-btn" onclick="doAsk(${entry.id}, this)">问</button>
    <div class="answer"></div>
  </div>`;
  // 笔记面板
  html += `<div class="notes-panel">
    <div class="notes-list"></div>
    <div class="note-input-area">
      <textarea rows="2" placeholder="记下感想、摘录的例句…"></textarea>
      <button onclick="addNote(${entry.id}, this)">存</button>
    </div>
  </div>`;

  div.innerHTML = html;

  // 听按钮（邂逅页）
  if (showListen) {
    const controls = document.createElement('div');
    controls.className = 'recite-controls';
    const listenBtn = document.createElement('button');
    listenBtn.textContent = '听';
    listenBtn.addEventListener('click', function() {
      if (currentSpeakBtn && currentSpeakBtn !== listenBtn) {
        speechSynthesis.cancel();
        currentSpeakBtn.textContent = '听';
        currentSpeakBtn.classList.remove('speaking');
      }
      if (listenBtn.classList.contains('speaking')) {
        speechSynthesis.cancel();
        listenBtn.textContent = '听';
        listenBtn.classList.remove('speaking');
        currentSpeakBtn = null;
      } else {
        speak(entry.content, listenBtn);
      }
    });
    controls.appendChild(listenBtn);
    div.querySelector('.actions').before(controls);
  }

  return div;
}

function parseTags(tagsStr) {
  if (!tagsStr || !tagsStr.trim()) return [];
  return tagsStr.trim().split(/\s+/).filter(Boolean);
}

// ── 面板开关 ──────────────────────────────────────
function togglePanel(btn, type) {
  const card = btn.closest('.card');
  const panelClass = type === 'ety' ? 'etymology-panel' : type === 'ask' ? 'ask-panel' : 'notes-panel';
  const panel = card.querySelector('.' + panelClass);
  const isShow = panel.classList.contains('show');

  // 关闭同卡片其他面板
  card.querySelectorAll('.ai-panel, .notes-panel').forEach(p => p.classList.remove('show'));
  card.querySelectorAll('.actions span').forEach(s => s.classList.remove('active-action'));

  if (!isShow) {
    panel.classList.add('show');
    btn.classList.add('active-action');
    if (type === 'ety') loadEtymology(card);
    if (type === 'notes') loadNotes(card);
  }
}

// ── 溯源 ──────────────────────────────────────────
async function loadEtymology(card) {
  const panel = card.querySelector('.etymology-panel');
  if (panel.dataset.loaded) return;
  panel.textContent = '查证中…';
  const id = parseInt(card.dataset.id);
  const data = await api('/api/etymology', { method: 'POST', body: JSON.stringify({ id }) });
  panel.textContent = data.content || data.error || '未能查到';
  panel.dataset.loaded = '1';
}

// ── 试问 ──────────────────────────────────────────
async function doAsk(id, btn) {
  const panel = btn.closest('.ask-panel');
  const question = panel.querySelector('textarea').value;
  const answerDiv = panel.querySelector('.answer');
  answerDiv.textContent = '寻思中…';
  const data = await api('/api/ask', { method: 'POST', body: JSON.stringify({ id, question }) });
  const answer = data.content || data.error || '暂无回应';
  answerDiv.textContent = answer;

  // 查全诗按钮——取答案里出现的第一个书名号内容作搜索词
  const titleMatch = answer.match(/《([^》]+)》/);
  if (titleMatch) {
    const searchWord = titleMatch[1];
    const link = document.createElement('a');
    link.href = `https://www.gushiwen.cn/search.aspx?value=${encodeURIComponent(searchWord)}`;
    link.target = '_blank';
    link.style.cssText = 'display:block;margin-top:8px;font-size:12px;color:var(--accent);';
    link.textContent = `查全诗：《${searchWord}》→`;
    answerDiv.appendChild(link);
  }
}

// ── 笔记 ──────────────────────────────────────────
async function loadNotes(card) {
  const panel = card.querySelector('.notes-panel');
  const list = panel.querySelector('.notes-list');
  if (panel.dataset.loaded) return;
  const id = parseInt(card.dataset.id);
  const data = await api(`/api/entry/${id}/notes`);
  list.innerHTML = '';
  (data.notes || []).forEach(n => renderNoteItem(list, n));
  panel.dataset.loaded = '1';
}

function renderNoteItem(list, note) {
  const div = document.createElement('div');
  div.className = 'note-item';
  div.dataset.noteId = note.id;
  div.innerHTML = `<span>${escapeHtml(note.content)}</span><span class="note-del" onclick="deleteNote(${note.id}, this)">删</span>`;
  list.appendChild(div);
}

async function addNote(entryId, btn) {
  const panel = btn.closest('.notes-panel');
  const textarea = panel.querySelector('textarea');
  const content = textarea.value.trim();
  if (!content) return;
  const data = await api(`/api/entry/${entryId}/notes`, { method: 'POST', body: JSON.stringify({ content }) });
  if (data.id) {
    renderNoteItem(panel.querySelector('.notes-list'), data);
    textarea.value = '';
  }
}

async function deleteNote(noteId, btn) {
  if (!confirm('删除这条笔记？')) return;
  await api(`/api/note/${noteId}`, { method: 'DELETE' });
  btn.closest('.note-item').remove();
}

// ── 标签 ──────────────────────────────────────────
function toggleTagEdit(btn) {
  const card = btn.closest('.card');
  const panel = card.querySelector('.tag-edit-panel');
  panel.classList.toggle('show');
}

async function saveTags(id, btn) {
  const input = btn.previousElementSibling;
  const tags = input.value.trim();
  await api(`/api/entry/${id}`, { method: 'PUT', body: JSON.stringify({ tags }) });
  const card = btn.closest('.card');
  card.querySelector('.tag-edit-panel').classList.remove('show');
  // 更新标签显示
  let tagDiv = card.querySelector('.tags');
  const tagList = parseTags(tags);
  if (tagList.length > 0) {
    if (!tagDiv) {
      tagDiv = document.createElement('div');
      tagDiv.className = 'tags';
      card.querySelector('.source, .note, .content').after(tagDiv);
    }
    tagDiv.innerHTML = tagList.map(t => `<span class="tag" onclick="filterByTag('${escapeHtml(t)}')">${escapeHtml(t)}</span>`).join('');
  } else if (tagDiv) {
    tagDiv.remove();
  }
}

function filterByTag(tag) {
  switchView('shelf');
  document.getElementById('shelfSearch').value = tag;
  shelfOffset = 0;
  loadShelf({ q: tag, mode: 'keyword' });
}

// ── 编辑/删除 ─────────────────────────────────────
async function editEntry(id, btn) {
  const card = btn.closest('.card');
  const contentDiv = card.querySelector('.content');
  const updated = prompt('编辑内容：', contentDiv.textContent);
  if (updated === null || updated === contentDiv.textContent) return;
  await api(`/api/entry/${id}`, { method: 'PUT', body: JSON.stringify({ content: updated }) });
  contentDiv.textContent = updated;
}

async function deleteEntry(id, btn) {
  if (!confirm('确定删除这一条？')) return;
  await api(`/api/entry/${id}`, { method: 'DELETE' });
  btn.closest('.card').remove();
}

// ── 邂逅（随机+听）────────────────────────────────
async function loadRandom() {
  const list = document.getElementById('home-list');
  list.innerHTML = '<div class="empty">翻阅中…</div>';
  const data = await api('/api/random?n=8');
  list.innerHTML = '';
  if (!data.entries || data.entries.length === 0) {
    list.innerHTML = '<div class="empty">库里还空着，去"录入"添加一些吧</div>';
    return;
  }
  data.entries.forEach(e => list.appendChild(renderCard(e, true)));
}

// ── 语音 ──────────────────────────────────────────
function pickBestVoice() {
  const voices = speechSynthesis.getVoices();
  // 优先选优化音质中文语音
  const preferred = ['li mu', 'lì mù', '李牧', 'siri', 'enhanced'];
  for (const p of preferred) {
    const v = voices.find(v => v.name.toLowerCase().includes(p) && v.lang.startsWith('zh'));
    if (v) return v;
  }
  return voices.find(v => v.lang.startsWith('zh')) || voices[0];
}

function speak(text, btn) {
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-CN';
  utter.rate = 0.72;
  const voice = pickBestVoice();
  if (voice) utter.voice = voice;
  utter.onstart = () => {
    if (btn) { btn.textContent = '停'; btn.classList.add('speaking'); currentSpeakBtn = btn; }
  };
  utter.onend = utter.onerror = () => {
    if (btn) { btn.textContent = '听'; btn.classList.remove('speaking'); }
    currentSpeakBtn = null;
  };
  speechSynthesis.speak(utter);
}

// ── 藏书 ──────────────────────────────────────────
async function loadShelf(opts = {}) {
  const list = document.getElementById('shelf-list');
  list.innerHTML = '<div class="empty">翻阅中…</div>';
  const q = opts.q !== undefined ? opts.q : document.getElementById('shelfSearch').value.trim();
  const mode = opts.mode || document.getElementById('shelfMode').value;

  let data;
  if (q) {
    if (mode === 'semantic') {
      data = await api('/api/semantic', { method: 'POST', body: JSON.stringify({ query: q, n: 20 }) });
      data.total = (data.entries || []).length;
    } else {
      data = await api(`/api/search?q=${encodeURIComponent(q)}`);
      data.total = (data.entries || []).length;
    }
  } else {
    data = await api(`/api/entries?limit=${SHELF_LIMIT}&offset=${shelfOffset}`);
  }

  list.innerHTML = '';
  shelfTotal = data.total || 0;

  if (!data.entries || data.entries.length === 0) {
    list.innerHTML = '<div class="empty">没有找到相符的</div>';
    renderPagination(q);
    return;
  }
  data.entries.forEach(e => list.appendChild(renderCard(e, false)));
  renderPagination(q);
}

function renderPagination(q) {
  const pg = document.getElementById('shelf-pagination');
  if (q) { pg.innerHTML = ''; return; }
  const totalPages = Math.ceil(shelfTotal / SHELF_LIMIT);
  const currentPage = Math.floor(shelfOffset / SHELF_LIMIT) + 1;
  pg.innerHTML = '';
  if (shelfOffset > 0) {
    const prev = document.createElement('span');
    prev.textContent = '← 前页';
    prev.onclick = () => { shelfOffset -= SHELF_LIMIT; loadShelf(); };
    pg.appendChild(prev);
  }
  const info = document.createElement('span');
  info.className = 'page-info';
  info.textContent = `${currentPage} / ${totalPages || 1}（共 ${shelfTotal} 条）`;
  pg.appendChild(info);
  if (shelfOffset + SHELF_LIMIT < shelfTotal) {
    const next = document.createElement('span');
    next.textContent = '后页 →';
    next.onclick = () => { shelfOffset += SHELF_LIMIT; loadShelf(); };
    pg.appendChild(next);
  }
}

async function doShelfSearch() {
  shelfOffset = 0;
  loadShelf();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('shelfSearch').addEventListener('keydown', e => {
    if (e.key === 'Enter') doShelfSearch();
  });
});

// ── 导出 ──────────────────────────────────────────
async function doExport() {
  const data = await api('/api/export');
  if (!data.entries || data.entries.length === 0) { alert('词库为空'); return; }
  const lines = data.entries.map(e => {
    let s = e.content;
    if (e.source) s += `\n——${e.source}`;
    if (e.note) s += `\n［${e.note}］`;
    if (e.tags) s += `\n#${e.tags.trim().split(/\s+/).join(' #')}`;
    return s;
  });
  const blob = new Blob([lines.join('\n\n---\n\n')], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `拾遗_${new Date().toLocaleDateString('zh-CN')}.txt`;
  a.click();
}

// ── 录入 ──────────────────────────────────────────
async function doImport() {
  const text = document.getElementById('importText').value;
  if (!text.trim()) return;
  const resultDiv = document.getElementById('import-result');
  resultDiv.innerHTML = '<div class="empty">整理中，请稍候…</div>';
  const data = await api('/api/import', { method: 'POST', body: JSON.stringify({ text }) });
  if (data.error) {
    resultDiv.innerHTML = `<div class="empty">出错了：${escapeHtml(data.error)}</div>`;
    return;
  }
  resultDiv.innerHTML = `<p class="hint" style="margin-top:12px;">已收入 ${data.count} 条：</p>`;
  data.inserted.forEach(e => resultDiv.appendChild(renderCard(e, false)));
  document.getElementById('importText').value = '';
}

// 初始加载
loadRandom();
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拾遗</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&display=swap');

:root {
  --paper:    #f5f0e8;
  --paper-2:  #ede8dc;
  --ink:      #1e1c19;
  --ink-mid:  #4a4540;
  --ink-soft: #8c8479;
  --line:     #d8d0c4;
  --accent:   #7a5c3a;
  --accent-l: #c4a882;
  --gold:     #9e7e4e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Noto Serif SC", "Songti SC", "STSong", "SimSun", serif;
  background: var(--paper);
  color: var(--ink);
  line-height: 2;
  padding-bottom: 80px;
  min-height: 100vh;
}

/* ── 页头 ── */
header {
  padding: 36px 24px 20px;
  text-align: center;
  border-bottom: 1px solid var(--line);
  background: var(--paper);
}
header h1 {
  font-size: 34px;
  font-weight: 300;
  letter-spacing: 0.6em;
  color: var(--ink);
  text-indent: 0.6em;
  margin-bottom: 4px;
}
header .sub {
  font-size: 12px;
  color: var(--ink-soft);
  letter-spacing: 0.4em;
  text-indent: 0.4em;
}
header .sub span { margin: 0 6px; }

/* ── 底部导航 ── */
nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex;
  background: var(--paper);
  border-top: 1px solid var(--line);
  z-index: 100;
}
nav button {
  flex: 1; background: none; border: none;
  padding: 13px 0 11px;
  font-family: inherit; font-size: 13px;
  color: var(--ink-soft); letter-spacing: 0.25em;
  cursor: pointer; transition: color 0.2s;
}
nav button.active {
  color: var(--accent);
  border-top: 1.5px solid var(--accent);
  margin-top: -1px;
}

/* ── 主区域 ── */
main { max-width: 600px; margin: 0 auto; padding: 20px 16px; }
.view { display: none; }
.view.active { display: block; }

/* ── 卡片 ── */
.card {
  background: #faf6ee;
  border: 1px solid var(--line);
  border-radius: 2px;
  padding: 22px 22px 16px;
  margin-bottom: 16px;
  position: relative;
}
.card::before {
  content: '';
  position: absolute;
  left: 0; top: 16px; bottom: 16px;
  width: 2px;
  background: var(--line);
  border-radius: 1px;
}
.card.word::before { background: var(--accent-l); }

.card .content {
  font-size: 19px;
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 2.1;
  color: var(--ink);
  font-weight: 400;
}
.card.word .content {
  font-size: 24px;
  letter-spacing: 0.12em;
  font-weight: 300;
}
.card .note {
  margin-top: 10px;
  font-size: 13px;
  color: var(--ink-soft);
  white-space: pre-wrap;
  line-height: 1.8;
  padding-left: 1em;
  border-left: 2px solid var(--line);
}
.card .source {
  margin-top: 8px;
  font-size: 12px;
  color: var(--gold);
  text-align: right;
  letter-spacing: 0.08em;
}
.card .tags {
  margin-top: 8px;
  display: flex; flex-wrap: wrap; gap: 6px;
}
.card .tag {
  font-size: 11px; color: var(--accent);
  border: 1px solid var(--accent-l);
  border-radius: 20px; padding: 1px 10px;
  cursor: pointer; letter-spacing: 0.05em;
  background: transparent;
  transition: background 0.15s;
}
.card .tag:hover { background: #f0e8d8; }

/* ── 操作栏 ── */
.card .actions {
  margin-top: 14px;
  display: flex; gap: 0;
  border-top: 1px solid var(--line);
  padding-top: 10px;
}
.card .actions span {
  font-size: 12px;
  color: var(--ink-soft);
  letter-spacing: 0.15em;
  cursor: pointer;
  padding: 2px 12px 2px 0;
  transition: color 0.15s;
}
.card .actions span:hover { color: var(--accent); }
.card .actions span.active-action { color: var(--accent); }
.card .actions .action-right {
  margin-left: auto;
  display: flex; gap: 0;
}
.card .actions .action-right span {
  color: var(--line);
  padding: 2px 0 2px 10px;
  font-size: 11px;
}
.card .actions .action-right span:hover { color: var(--ink-soft); }

/* ── 综合面板（溯源+试问+笔记连贯区） ── */
.combined-panel {
  display: none;
  margin-top: 14px;
  border-top: 1px solid var(--line);
  padding-top: 14px;
}
.combined-panel.show { display: block; }

/* 溯源内容 */
.ety-content {
  font-size: 13.5px;
  color: var(--ink-mid);
  line-height: 1.9;
  white-space: pre-wrap;
  min-height: 20px;
}
.ety-content.loading { color: var(--ink-soft); font-style: italic; }

/* 溯源下方的操作区 */
.panel-actions {
  margin-top: 12px;
  display: flex; gap: 10px;
  border-top: 1px dashed var(--line);
  padding-top: 10px;
}
.panel-tab {
  font-size: 12px; color: var(--ink-soft);
  cursor: pointer; letter-spacing: 0.1em;
  padding-bottom: 2px;
  border-bottom: 1px solid transparent;
  transition: all 0.15s;
}
.panel-tab.active { color: var(--accent); border-color: var(--accent); }

/* 试问和笔记的输入区 */
.panel-input-area { margin-top: 10px; }
.panel-input-area textarea {
  width: 100%;
  font-family: inherit; font-size: 13px;
  border: none;
  border-bottom: 1px solid var(--line);
  padding: 6px 0;
  background: transparent;
  color: var(--ink);
  resize: none;
  line-height: 1.8;
  outline: none;
}
.panel-input-area textarea:focus { border-color: var(--accent-l); }
.panel-input-area textarea::placeholder { color: var(--ink-soft); font-size: 12px; }
.panel-submit {
  margin-top: 8px;
  font-family: inherit; font-size: 12px;
  border: 1px solid var(--accent-l);
  background: none; color: var(--accent);
  border-radius: 2px; padding: 4px 16px;
  cursor: pointer; letter-spacing: 0.15em;
  transition: all 0.15s;
}
.panel-submit:hover { background: var(--accent); color: #faf6ee; }

/* 试问回答 */
.ask-answer {
  margin-top: 10px;
  font-size: 13.5px; color: var(--ink-mid);
  line-height: 1.9; white-space: pre-wrap;
  padding-left: 10px;
  border-left: 2px solid var(--accent-l);
}
.ask-answer a {
  display: inline-block; margin-top: 6px;
  font-size: 12px; color: var(--gold);
  text-decoration: none; letter-spacing: 0.05em;
}
.ask-answer a:hover { text-decoration: underline; }

/* 笔记列表 */
.notes-list { margin-top: 6px; }
.note-item {
  display: flex; justify-content: space-between;
  align-items: flex-start; gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid var(--line);
  font-size: 13px; color: var(--ink-mid);
  line-height: 1.8;
}
.note-item:last-child { border-bottom: none; }
.note-del {
  font-size: 11px; color: var(--line);
  cursor: pointer; flex-shrink: 0;
  transition: color 0.15s;
}
.note-del:hover { color: var(--ink-soft); }

/* 标签编辑 */
.tag-edit-panel { display: none; margin-top: 10px; }
.tag-edit-panel.show { display: flex; gap: 8px; align-items: center; }
.tag-edit-panel input {
  flex: 1; font-family: inherit; font-size: 12px;
  border: none; border-bottom: 1px solid var(--line);
  padding: 4px 0; background: transparent;
  color: var(--ink); outline: none;
}
.tag-edit-panel input:focus { border-color: var(--accent-l); }
.tag-edit-panel button {
  font-family: inherit; font-size: 12px;
  border: 1px solid var(--accent-l); background: none;
  color: var(--accent); border-radius: 2px;
  padding: 3px 10px; cursor: pointer;
}

/* ── 邂逅页 ── */
.refresh-btn {
  display: block; margin: 4px auto 20px;
  background: none; border: 1px solid var(--line);
  color: var(--ink-soft); border-radius: 20px;
  padding: 6px 28px; font-family: inherit;
  font-size: 12px; letter-spacing: 0.3em;
  cursor: pointer; transition: all 0.2s;
}
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

/* 听按钮 */
.listen-area { margin-top: 8px; }
.listen-btn {
  font-family: inherit; font-size: 11px;
  border: 1px solid var(--line); background: none;
  color: var(--ink-soft); border-radius: 20px;
  padding: 2px 14px; cursor: pointer;
  letter-spacing: 0.15em; transition: all 0.15s;
}
.listen-btn.speaking {
  border-color: var(--accent); color: var(--accent);
}

/* ── 藏书页 ── */
.shelf-bar {
  display: flex; gap: 8px; margin-bottom: 16px;
}
.shelf-bar input {
  flex: 1; font-family: inherit; font-size: 14px;
  padding: 8px 0; border: none;
  border-bottom: 1px solid var(--line);
  background: transparent; color: var(--ink);
  outline: none; letter-spacing: 0.05em;
}
.shelf-bar input:focus { border-color: var(--accent-l); }
.shelf-bar input::placeholder { color: var(--ink-soft); font-size: 13px; }
.shelf-bar select {
  font-family: inherit; font-size: 12px;
  border: 1px solid var(--line); border-radius: 2px;
  background: transparent; color: var(--ink-soft);
  padding: 4px 6px; cursor: pointer;
}
.shelf-bar button {
  font-family: inherit; font-size: 12px;
  border: 1px solid var(--accent-l); border-radius: 2px;
  background: none; color: var(--accent);
  padding: 4px 14px; cursor: pointer;
  letter-spacing: 0.15em;
}
.shelf-pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 16px; margin-top: 20px;
  font-size: 12px; color: var(--ink-soft);
  letter-spacing: 0.1em;
}
.shelf-pagination span { cursor: pointer; }
.shelf-pagination span:hover { color: var(--accent); }
.shelf-pagination .page-info { cursor: default; color: var(--ink-soft); }
.export-btn {
  display: block; margin: 24px auto 0;
  background: none; border: none;
  color: var(--line); font-family: inherit;
  font-size: 11px; letter-spacing: 0.2em;
  cursor: pointer; text-decoration: underline;
  text-underline-offset: 3px;
  transition: color 0.15s;
}
.export-btn:hover { color: var(--ink-soft); }

/* ── 录入页 ── */
.import-hint {
  font-size: 12px; color: var(--ink-soft);
  letter-spacing: 0.05em; margin-bottom: 12px;
  line-height: 1.8;
}
textarea#importText {
  width: 100%; height: 200px;
  font-family: inherit; font-size: 14px;
  padding: 14px; line-height: 2;
  border: 1px solid var(--line); border-radius: 2px;
  background: #faf6ee; color: var(--ink);
  resize: vertical; outline: none;
}
textarea#importText:focus { border-color: var(--accent-l); }
.primary-btn {
  margin-top: 12px;
  background: var(--accent); color: #faf6ee;
  border: none; border-radius: 2px;
  padding: 10px 24px; font-family: inherit;
  font-size: 13px; letter-spacing: 0.25em;
  cursor: pointer; transition: background 0.2s;
}
.primary-btn:hover { background: #6a4c2a; }

.empty {
  text-align: center; color: var(--ink-soft);
  font-size: 13px; padding: 40px 0;
  letter-spacing: 0.1em;
}
</style>
</head>
<body>

<header>
  <h1>拾遗</h1>
  <div class="sub">
    <span>古语</span>·<span>旧句</span>·<span>私藏</span>
  </div>
</header>

<main>
  <!-- 邂逅 -->
  <div class="view active" id="view-home">
    <button class="refresh-btn" onclick="loadRandom()">再看几条</button>
    <div id="home-list"></div>
  </div>

  <!-- 藏书 -->
  <div class="view" id="view-shelf">
    <div class="shelf-bar">
      <input type="text" id="shelfSearch" placeholder="搜词句、意思、标记……">
      <select id="shelfMode">
        <option value="keyword">关键词</option>
        <option value="semantic">意思</option>
      </select>
      <button onclick="doShelfSearch()">寻</button>
    </div>
    <div id="shelf-list"></div>
    <div class="shelf-pagination" id="shelf-pagination"></div>
    <button class="export-btn" onclick="doExport()">导出全部词条</button>
  </div>

  <!-- 录入 -->
  <div class="view" id="view-import">
    <p class="import-hint">把摘抄的文本整段粘贴进来，系统只做切分整理，不会自动添加解释。</p>
    <textarea id="importText" placeholder="粘贴一段或多段摘抄……"></textarea>
    <button class="primary-btn" onclick="doImport()">整理入库</button>
    <div id="import-result"></div>
  </div>
</main>

<nav>
  <button class="active" data-view="home" onclick="switchView('home')">邂逅</button>
  <button data-view="shelf" onclick="switchView('shelf')">藏书</button>
  <button data-view="import" onclick="switchView('import')">录入</button>
</nav>

<script>
const API_BASE = 'https://shici-vault.demi89612.workers.dev';

let shelfOffset = 0;
const SHELF_LIMIT = 20;
let shelfTotal = 0;
let currentSpeakBtn = null;

// ── 视图切换 ──
function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelector(`nav button[data-view="${name}"]`).classList.add('active');
  if (name === 'home' && !document.getElementById('home-list').children.length) loadRandom();
  if (name === 'shelf' && !document.getElementById('shelf-list').children.length) loadShelf();
}

async function api(path, opts = {}) {
  const res = await fetch(API_BASE + path, {
    headers: { 'Content-Type': 'application/json' }, ...opts
  });
  return res.json();
}

function escapeHtml(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function parseTags(str) {
  if (!str || !str.trim()) return [];
  return str.trim().split(/\s+/).filter(Boolean);
}

// ── 卡片渲染 ──
function renderCard(entry, showListen = false) {
  const div = document.createElement('div');
  div.className = 'card ' + entry.type;
  div.dataset.id = entry.id;

  // 正文
  let html = `<div class="content">${escapeHtml(entry.content)}</div>`;
  if (entry.note) html += `<div class="note">${escapeHtml(entry.note)}</div>`;
  if (entry.source) html += `<div class="source">${escapeHtml(entry.source)}</div>`;

  // 标签
  const tagList = parseTags(entry.tags);
  if (tagList.length > 0) {
    html += `<div class="tags">${tagList.map(t =>
      `<span class="tag" onclick="filterByTag('${escapeHtml(t)}')">${escapeHtml(t)}</span>`
    ).join('')}</div>`;
  }

  // 听按钮（仅邂逅页）
  if (showListen) {
    html += `<div class="listen-area"><button class="listen-btn">听</button></div>`;
  }

  // 操作栏
  html += `<div class="actions">
    <span class="ety-toggle" onclick="toggleCombined(this)">溯源</span>
    <span onclick="toggleTagEdit(this)">标记</span>
    <div class="action-right">
      <span onclick="editEntry(${entry.id}, this)">改</span>
      <span onclick="deleteEntry(${entry.id}, this)">删</span>
    </div>
  </div>`;

  // 标签编辑
  html += `<div class="tag-edit-panel">
    <input type="text" placeholder="用空格分隔多个标记" value="${escapeHtml(entry.tags || '')}">
    <button onclick="saveTags(${entry.id}, this)">存</button>
  </div>`;

  // 综合面板：溯源内容 + 试问 + 笔记（连贯）
  html += `<div class="combined-panel">
    <div class="ety-content loading">查证中…</div>
    <div class="panel-actions">
      <span class="panel-tab active" onclick="switchPanelTab(this,'ask')">试问</span>
      <span class="panel-tab" onclick="switchPanelTab(this,'notes')">笔记</span>
    </div>
    <div class="panel-input-area ask-area">
      <textarea rows="2" placeholder="想问什么？留空则给出一般解读"></textarea>
      <button class="panel-submit" onclick="doAsk(${entry.id}, this)">问</button>
      <div class="ask-answer"></div>
    </div>
    <div class="panel-input-area notes-area" style="display:none">
      <div class="notes-list"></div>
      <textarea rows="2" placeholder="记下感想、摘录好句……"></textarea>
      <button class="panel-submit" onclick="addNote(${entry.id}, this)">存</button>
    </div>
  </div>`;

  div.innerHTML = html;

  // 听按钮事件（需要在 innerHTML 之后绑定）
  if (showListen) {
    const btn = div.querySelector('.listen-btn');
    btn.addEventListener('click', function () {
      if (currentSpeakBtn && currentSpeakBtn !== btn) {
        speechSynthesis.cancel();
        currentSpeakBtn.textContent = '听';
        currentSpeakBtn.classList.remove('speaking');
      }
      if (btn.classList.contains('speaking')) {
        speechSynthesis.cancel();
        btn.textContent = '听';
        btn.classList.remove('speaking');
        currentSpeakBtn = null;
      } else {
        speak(entry.content, btn);
      }
    });
  }

  return div;
}

// ── 综合面板开关 ──
function toggleCombined(btn) {
  const card = btn.closest('.card');
  const panel = card.querySelector('.combined-panel');
  const isShow = panel.classList.contains('show');
  panel.classList.toggle('show');
  btn.classList.toggle('active-action', !isShow);
  if (!isShow && !panel.dataset.etyLoaded) {
    loadEtymology(card);
  }
}

function switchPanelTab(btn, tab) {
  const panel = btn.closest('.combined-panel');
  panel.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  panel.querySelector('.ask-area').style.display = tab === 'ask' ? 'block' : 'none';
  panel.querySelector('.notes-area').style.display = tab === 'notes' ? 'block' : 'none';
  if (tab === 'notes' && !panel.dataset.notesLoaded) {
    loadNotes(btn.closest('.card'));
  }
}

// ── 溯源 ──
async function loadEtymology(card) {
  const panel = card.querySelector('.combined-panel');
  const div = card.querySelector('.ety-content');
  panel.dataset.etyLoaded = '1';
  const id = parseInt(card.dataset.id);
  const data = await api('/api/etymology', { method: 'POST', body: JSON.stringify({ id }) });
  div.classList.remove('loading');
  div.textContent = data.content || data.error || '未能查到';
}

// ── 试问 ──
async function doAsk(id, btn) {
  const panel = btn.closest('.combined-panel');
  const textarea = panel.querySelector('.ask-area textarea');
  const answerDiv = panel.querySelector('.ask-answer');
  answerDiv.textContent = '寻思中……';
  const data = await api('/api/ask', {
    method: 'POST',
    body: JSON.stringify({ id, question: textarea.value })
  });
  const answer = data.content || data.error || '暂无回应';
  answerDiv.textContent = answer;
  // 查全诗链接
  const m = answer.match(/《([^》]+)》/);
  if (m) {
    const a = document.createElement('a');
    a.href = `https://www.gushiwen.cn/search.aspx?value=${encodeURIComponent(m[1])}`;
    a.target = '_blank';
    a.textContent = `查全诗：《${m[1]}》→`;
    answerDiv.appendChild(a);
  }
}

// ── 笔记 ──
async function loadNotes(card) {
  const panel = card.querySelector('.combined-panel');
  panel.dataset.notesLoaded = '1';
  const id = parseInt(card.dataset.id);
  const data = await api(`/api/entry/${id}/notes`);
  const list = card.querySelector('.notes-list');
  list.innerHTML = '';
  (data.notes || []).forEach(n => renderNoteItem(list, n));
}

function renderNoteItem(list, note) {
  const div = document.createElement('div');
  div.className = 'note-item';
  div.innerHTML = `<span>${escapeHtml(note.content)}</span>
    <span class="note-del" onclick="deleteNote(${note.id}, this)">删</span>`;
  list.appendChild(div);
}

async function addNote(entryId, btn) {
  const area = btn.closest('.notes-area');
  const textarea = area.querySelector('textarea');
  const content = textarea.value.trim();
  if (!content) return;
  const data = await api(`/api/entry/${entryId}/notes`, {
    method: 'POST', body: JSON.stringify({ content })
  });
  if (data.id) {
    renderNoteItem(area.querySelector('.notes-list'), data);
    textarea.value = '';
  }
}

async function deleteNote(noteId, btn) {
  if (!confirm('删除这条笔记？')) return;
  await api(`/api/note/${noteId}`, { method: 'DELETE' });
  btn.closest('.note-item').remove();
}

// ── 标签 ──
function toggleTagEdit(btn) {
  btn.closest('.card').querySelector('.tag-edit-panel').classList.toggle('show');
}

async function saveTags(id, btn) {
  const input = btn.previousElementSibling;
  const tags = input.value.trim();
  await api(`/api/entry/${id}`, { method: 'PUT', body: JSON.stringify({ tags }) });
  const card = btn.closest('.card');
  card.querySelector('.tag-edit-panel').classList.remove('show');
  let tagDiv = card.querySelector('.tags');
  const tagList = parseTags(tags);
  if (tagList.length > 0) {
    if (!tagDiv) {
      tagDiv = document.createElement('div');
      tagDiv.className = 'tags';
      const src = card.querySelector('.source');
      const note = card.querySelector('.note');
      const after = src || note || card.querySelector('.content');
      after.insertAdjacentElement('afterend', tagDiv);
    }
    tagDiv.innerHTML = tagList.map(t =>
      `<span class="tag" onclick="filterByTag('${escapeHtml(t)}')">${escapeHtml(t)}</span>`
    ).join('');
  } else if (tagDiv) tagDiv.remove();
}

function filterByTag(tag) {
  switchView('shelf');
  document.getElementById('shelfSearch').value = tag;
  shelfOffset = 0;
  loadShelf({ q: tag, mode: 'keyword' });
}

// ── 编辑/删除 ──
async function editEntry(id, btn) {
  const card = btn.closest('.card');
  const contentDiv = card.querySelector('.content');
  const updated = prompt('编辑内容：', contentDiv.textContent);
  if (updated === null || updated === contentDiv.textContent) return;
  await api(`/api/entry/${id}`, { method: 'PUT', body: JSON.stringify({ content: updated }) });
  contentDiv.textContent = updated;
}

async function deleteEntry(id, btn) {
  if (!confirm('确定删除这一条？')) return;
  await api(`/api/entry/${id}`, { method: 'DELETE' });
  btn.closest('.card').remove();
}

// ── 语音 ──
function pickBestVoice() {
  const voices = speechSynthesis.getVoices();
  const preferred = ['li mu', 'lì mù', '李牧', 'enhanced', 'siri'];
  for (const p of preferred) {
    const v = voices.find(v => v.name.toLowerCase().includes(p) && v.lang.startsWith('zh'));
    if (v) return v;
  }
  return voices.find(v => v.lang.startsWith('zh')) || voices[0];
}

function speak(text, btn) {
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-CN';
  utter.rate = 0.72;
  const voice = pickBestVoice();
  if (voice) utter.voice = voice;
  utter.onstart = () => {
    if (btn) { btn.textContent = '停'; btn.classList.add('speaking'); currentSpeakBtn = btn; }
  };
  utter.onend = utter.onerror = () => {
    if (btn) { btn.textContent = '听'; btn.classList.remove('speaking'); }
    currentSpeakBtn = null;
  };
  speechSynthesis.speak(utter);
}

// ── 邂逅 ──
async function loadRandom() {
  const list = document.getElementById('home-list');
  list.innerHTML = '<div class="empty">翻阅中……</div>';
  const data = await api('/api/random?n=8');
  list.innerHTML = '';
  if (!data.entries || data.entries.length === 0) {
    list.innerHTML = '<div class="empty">库里还空着，去「录入」添加一些吧</div>';
    return;
  }
  data.entries.forEach(e => list.appendChild(renderCard(e, true)));
}

// ── 藏书 ──
async function loadShelf(opts = {}) {
  const list = document.getElementById('shelf-list');
  list.innerHTML = '<div class="empty">翻阅中……</div>';
  const q = opts.q !== undefined ? opts.q : document.getElementById('shelfSearch').value.trim();
  const mode = opts.mode || document.getElementById('shelfMode').value;

  let data;
  if (q) {
    if (mode === 'semantic') {
      data = await api('/api/semantic', { method: 'POST', body: JSON.stringify({ query: q, n: 20 }) });
      data.total = (data.entries || []).length;
    } else {
      data = await api(`/api/search?q=${encodeURIComponent(q)}`);
      data.total = (data.entries || []).length;
    }
  } else {
    data = await api(`/api/entries?limit=${SHELF_LIMIT}&offset=${shelfOffset}`);
  }

  list.innerHTML = '';
  shelfTotal = data.total || 0;
  if (!data.entries || data.entries.length === 0) {
    list.innerHTML = '<div class="empty">没有找到相符的</div>';
    renderPagination(q); return;
  }
  data.entries.forEach(e => list.appendChild(renderCard(e, false)));
  renderPagination(q);
}

function renderPagination(q) {
  const pg = document.getElementById('shelf-pagination');
  if (q) { pg.innerHTML = ''; return; }
  const totalPages = Math.ceil(shelfTotal / SHELF_LIMIT);
  const currentPage = Math.floor(shelfOffset / SHELF_LIMIT) + 1;
  pg.innerHTML = '';
  if (shelfOffset > 0) {
    const prev = document.createElement('span');
    prev.textContent = '← 前页';
    prev.onclick = () => { shelfOffset -= SHELF_LIMIT; loadShelf(); };
    pg.appendChild(prev);
  }
  const info = document.createElement('span');
  info.className = 'page-info';
  info.textContent = `${currentPage} / ${totalPages || 1}（共 ${shelfTotal} 条）`;
  pg.appendChild(info);
  if (shelfOffset + SHELF_LIMIT < shelfTotal) {
    const next = document.createElement('span');
    next.textContent = '后页 →';
    next.onclick = () => { shelfOffset += SHELF_LIMIT; loadShelf(); };
    pg.appendChild(next);
  }
}

async function doShelfSearch() { shelfOffset = 0; loadShelf(); }

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('shelfSearch').addEventListener('keydown', e => {
    if (e.key === 'Enter') doShelfSearch();
  });
});

// ── 导出 ──
async function doExport() {
  const data = await api('/api/export');
  if (!data.entries || data.entries.length === 0) { alert('词库为空'); return; }
  const lines = data.entries.map(e => {
    let s = e.content;
    if (e.source) s += `\n——${e.source}`;
    if (e.note) s += `\n［${e.note}］`;
    if (e.tags) s += `\n#${parseTags(e.tags).join(' #')}`;
    return s;
  });
  const blob = new Blob([lines.join('\n\n───\n\n')], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `拾遗_${new Date().toLocaleDateString('zh-CN')}.txt`;
  a.click();
}

// ── 录入 ──
async function doImport() {
  const text = document.getElementById('importText').value;
  if (!text.trim()) return;
  const resultDiv = document.getElementById('import-result');
  resultDiv.innerHTML = '<div class="empty">整理中，请稍候……</div>';
  const data = await api('/api/import', { method: 'POST', body: JSON.stringify({ text }) });
  if (data.error) {
    resultDiv.innerHTML = `<div class="empty">出错了：${escapeHtml(data.error)}</div>`;
    return;
  }
  resultDiv.innerHTML = `<p style="font-size:12px;color:var(--ink-soft);margin:12px 0 8px;letter-spacing:0.1em;">已收入 ${data.count} 条</p>`;
  data.inserted.forEach(e => resultDiv.appendChild(renderCard(e, false)));
  document.getElementById('importText').value = '';
}

// 初始加载
loadRandom();
</script>
